name = "sbp-proxy"
main = "src/index.ts"
compatibility_date = "2025-09-24"

routes = [{ pattern = "proxy.savebrainpower.xyz", custom_domain = true }]

# This worker must never observe its traffic: it forwards plaintext AI calls
# and provider keys for users who opted into the hosted default. Keep every
# form of telemetry off and no console output anywhere in src/.
[observability]
enabled = false

[vars]
# Browser origins allowed to use this deployment (comma-separated). "*" opens
# it to any site — fine for a personal self-hosted proxy, not for the hosted
# default. curl-style clients are unaffected either way; that exposure is
# bounded by the per-IP rate limit below.
ALLOWED_ORIGINS = "https://sbp.gvclima.workers.dev,http://localhost:3000"

# Cloudflare's native rate limiter: transient per-edge counters, no storage,
# no logs — the only kind of abuse control that fits a no-logging proxy.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }
